name: hybrid-graphrag
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch (GPU version for Windows/Linux)
  - pytorch>=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1 # Thay đổi theo phiên bản CUDA của bạn (vd: 11.8)
  
  # ML & Data processing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - xgboost>=2.0.0
  - faiss-cpu>=1.7.4
  
  # Utilities
  - pyyaml>=6.0.1
  - tqdm>=4.66.0
  - loguru>=0.7.0
  - python-dotenv>=1.0.0
  - requests>=2.31.0
  - beautifulsoup4>=4.12.0
  - lxml>=5.0.0
  - tabulate>=0.9.0
  
  - pip:
    # NLP & Transformers
    - transformers==4.57.6
    - tokenizers==0.22.2
    - sentence-transformers>=2.3.0
    - underthesea>=6.8.0
    - pyvi>=0.1.1
    - datasets>=2.16.0  # Cần thiết cho script tải HotpotQA
    
    # Vector DB & Graph DB
    - chromadb>=0.4.0
    - neo4j>=5.14.0
    
    # Crawler
    - pdfplumber>=0.10.0
    - selenium>=4.15.0
    - webdriver-manager>=4.0.0
